<html>
  <head>
    <title>{{ .Title }}</title>
  </head>
  <body>
    <h1>{{ .Title }}</h1>

    {{ range .Paragraphs }}
    <p>{{ . }}</p>
    {{ end }}

    <hr />
    <ul>
      {{ range .Options }}
      <li><a href="/{{ .Arc }}">{{ .Text }}</a></li>
      {{ end }}
    </ul>
  </body>
</html>
